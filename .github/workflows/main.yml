name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-logic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm test

  build-image:
    needs: test-logic
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t praktikum-cicd-lelyta .
